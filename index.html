<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cadastramento</h1>
    </header>
    <main>
        <section id="espaco">
            <h2>Cadastre 5 números:</h2>
            <div id="botoes">
                <input type="number" name="numero" id="numero">
                <input type="button" value="Adicionar" id="click">
                <p><small id="pequeno"></small></p>
            </div>
            <div>
                <h2>Resultado:</h2>
                <p class="paragrafo"></p>
                <p class="paragrafo"></p>
                <p class="paragrafo"></p>
                <p class="paragrafo"></p>
                <p class="paragrafo"></p>
            </div>
        </section>
        <section>
            <div>
                <input type="button" value="Finalizar" id="final">
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
